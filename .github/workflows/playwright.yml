name: Playwright Tests
on:
  push:
    branches: [ main, master ]
  pull_request:
    branches: [ main, master ]

# Thêm quyền (permissions) cần thiết để deploy lên GitHub Pages
permissions:
  contents: read
  pages: write
  id-token: write

jobs:
  test:
    timeout-minutes: 60
    runs-on: ubuntu-latest
    steps:
    - uses: actions/checkout@v4
    - uses: actions/setup-node@v4
      with:
        node-version: lts/*
        
    - name: Install dependencies
      run: npm ci # (Nhớ dùng lệnh này, uv add chỉ dành cho Python)
      
    - name: Install Playwright Browsers
      run: npx playwright install --with-deps
      
    - name: Run Playwright tests
      run: npx playwright test
      
    # Vẫn giữ lại artifact tải xuống nếu bạn muốn backup
    - uses: actions/upload-artifact@v4
      if: ${{ !cancelled() }}
      with:
        name: playwright-report
        path: playwright-report/
        retention-days: 30

    # --- CÁC BƯỚC MỚI ĐỂ PUBLISH LÊN GITHUB PAGES ---
    
    - name: Setup GitHub Pages
      if: always()
      uses: actions/configure-pages@v4

    - name: Upload artifact for GitHub Pages
      if: always()
      uses: actions/upload-pages-artifact@v3
      with:
        path: playwright-report/ # Trỏ đúng vào thư mục chứa file index.html

    - name: Deploy to GitHub Pages
      # Thường chúng ta chỉ publish report khi merge code vào nhánh main/master
      if: always() && (github.ref == 'refs/heads/main' || github.ref == 'refs/heads/master')
      id: deployment
      uses: actions/deploy-pages@v4